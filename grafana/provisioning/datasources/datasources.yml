apiVersion: 1

datasources:
  - name: Prometheus
    uid: unhealthy-prom
    type: prometheus
    access: proxy
    url: http://127.0.0.1:9090
    isDefault: true
    editable: false
    jsonData:
      timeInterval: 15s

  - name: Loki
    uid: unhealthy-loki
    type: loki
    access: proxy
    url: http://127.0.0.1:3100
    editable: false
    jsonData:
      maxLines: 5000
      timeout: 60

  # Plex library snapshot. Read-only file produced daily by the User Scripts
  # entry `plex_media_analysis` on the Unraid host. If the file is missing,
  # the Plex Media Analysis dashboard shows "no data" — harmless.
  - name: Plex Library
    uid: unhealthy-plex-sqlite
    type: frser-sqlite-datasource
    access: proxy
    editable: false
    jsonData:
      path: /var/lib/grafana/plex_data/plex_snapshot.db
