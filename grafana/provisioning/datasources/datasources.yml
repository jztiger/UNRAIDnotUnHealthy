apiVersion: 1

datasources:
  - name: Prometheus
    uid: unhealthy-prom
    type: prometheus
    access: proxy
    url: http://127.0.0.1:9090
    isDefault: true
    editable: false
    jsonData:
      timeInterval: 15s

  - name: Loki
    uid: unhealthy-loki
    type: loki
    access: proxy
    url: http://127.0.0.1:3100
    editable: false
    jsonData:
      maxLines: 5000
      timeout: 60
