apiVersion: 1

datasources:
  - name: Prometheus
    uid: unhealthy-prom
    type: prometheus
    access: proxy
    url: http://127.0.0.1:9090
    isDefault: true
    editable: false
    jsonData:
      timeInterval: 15s

  - name: Loki
    uid: unhealthy-loki
    type: loki
    access: proxy
    url: http://127.0.0.1:3100
    editable: false
    jsonData:
      maxLines: 5000
      timeout: 60

  # Plex library snapshot. Produced daily by the User Scripts entry
  # `plex_media_analysis` on the Unraid host. If the file is missing,
  # the Plex Media Analysis dashboard shows "no data" — harmless.
  # The bind mount is :rw because SQLite (via the go-sqlite3 driver this
  # plugin uses) can't open a DB in pure read-only mode without journal
  # files alongside it; :ro mount blocks journal creation and the open
  # fails with SQLITE_CANTOPEN. The plugin only ever runs SELECT, and the
  # daily snapshot overwrites the file via atomic rename.
  - name: Plex Library
    uid: unhealthy-plex-sqlite
    type: frser-sqlite-datasource
    access: proxy
    editable: false
    jsonData:
      path: /var/lib/grafana/plex_data/plex_snapshot.db

  # NOTE: datasources "Tautulli History" (uid unhealthy-tautulli-sqlite) and
  # "Tdarr DB" (uid unhealthy-tdarr-sqlite) already exist as UI-created
  # datasources in the persistent grafana.db, pointing at the same
  # tautulli_snapshot.db / tdarr_snapshot.db. Do NOT provision them here —
  # Grafana refuses to provision over a matching UI-created uid and crash-loops.
  # Phase 2 panels reference those uids directly and bind to the existing ones.

  # Phase 2 sibling-coverage progress. Refreshed every 6h by
  # phase2_sibling_coverage.sh (User Scripts). Targets from Plex DB,
  # siblings counted by "- 1080p SDR" filename on disk.
  - name: Phase2 Progress
    uid: unhealthy-phase2-sqlite
    type: frser-sqlite-datasource
    access: proxy
    editable: false
    jsonData:
      path: /var/lib/grafana/plex_data/phase2_progress.db
