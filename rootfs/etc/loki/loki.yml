auth_enabled: false

server:
  http_listen_address: 127.0.0.1
  http_listen_port: 3100
  grpc_listen_address: 127.0.0.1
  grpc_listen_port: 9096
  log_level: warn

common:
  # Keep all internal traffic on loopback. Without this, Loki's lifecycler
  # auto-discovers the container's primary IP — which on macvlan is the
  # external LAN IP (192.168.1.100) — and advertises that in the ring. The
  # container can't loopback to its own macvlan IP from inside, so any push
  # routed via the ring fails with "connection refused."
  instance_addr: 127.0.0.1
  path_prefix: /var/lib/loki
  storage:
    filesystem:
      chunks_directory: /var/lib/loki/chunks
      rules_directory: /var/lib/loki/rules
  replication_factor: 1
  ring:
    instance_addr: 127.0.0.1
    kvstore:
      store: inmemory

schema_config:
  configs:
    - from: 2024-01-01
      store: tsdb
      object_store: filesystem
      schema: v13
      index:
        prefix: index_
        period: 24h

limits_config:
  retention_period: ${LOKI_RETENTION:-14d}
  # Aggressive limits sized for the initial backfill burst — Alloy reads
  # every running container's full historical Docker log on first connect,
  # which can briefly exceed the defaults. Steady-state rates are far
  # below these numbers.
  ingestion_rate_mb: 64
  ingestion_burst_size_mb: 128
  per_stream_rate_limit: 32MB
  per_stream_rate_limit_burst: 64MB
  # Don't reject old samples on ingest — Alloy replays each running
  # container's full historical Docker log on first connection, and some
  # containers haven't restarted in months. Anything outside the
  # retention window will be compacted away on its own schedule.
  reject_old_samples: false
  # Truncate (rather than reject) log lines over the 256KB default.
  # Some containers (flaresolverr in particular) dump full HTTP response
  # bodies to stdout — those routinely exceed 300KB. Keeping the first
  # chunk is more useful than dropping the line entirely.
  max_line_size_truncate: true
  max_query_series: 5000
  allow_structured_metadata: true

compactor:
  working_directory: /var/lib/loki/compactor
  compaction_interval: 10m
  retention_enabled: true
  retention_delete_delay: 2h
  retention_delete_worker_count: 150
  delete_request_store: filesystem

ingester:
  # Per-stream out-of-order acceptance window. The effective window is
  # roughly max_chunk_age / 2 (Loki splits the window symmetrically around
  # the chunk's anchor point), so set max_chunk_age = 2x what we want to
  # accept. We want to keep all of "the current year" of backfill, so
  # 8760h (1 year) gives an effective ~6-month window — covers anything
  # from late 2025 through whatever is current.
  max_chunk_age: 8760h
  chunk_idle_period: 1h

ruler:
  storage:
    type: local
    local:
      directory: /var/lib/loki/rules
  rule_path: /var/lib/loki/rules-temp
  ring:
    kvstore:
      store: inmemory

analytics:
  reporting_enabled: false
