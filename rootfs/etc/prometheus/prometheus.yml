global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    instance: unraid

scrape_configs:
  - job_name: prometheus
    # username is fixed at closet-pi to match the generated web-config
    # (rootfs/etc/cont-init.d/03-prometheus-web-config); Prometheus basic_auth
    # has no username_file, so this cannot be env-driven.
    basic_auth:
      username: closet-pi
      password_file: /run/prometheus/self_scrape_password
    static_configs:
      - targets: ['127.0.0.1:9090']

  - job_name: node
    static_configs:
      - targets: ['127.0.0.1:9100']

  - job_name: cadvisor
    static_configs:
      - targets: ['127.0.0.1:8080']
    metric_relabel_configs:
      # Drop the noisy per-mountpoint metrics for cgroup pseudo-fs.
      - source_labels: [__name__, fstype]
        regex: 'container_fs_.+;(tmpfs|overlay)'
        action: drop

  - job_name: smartctl
    scrape_interval: 60s
    static_configs:
      - targets: ['127.0.0.1:9633']

  - job_name: nvidia
    static_configs:
      - targets: ['127.0.0.1:9835']

  # ipmi_exporter "module" pattern: probe with module=default
  - job_name: ipmi
    scrape_interval: 60s
    metrics_path: /metrics
    static_configs:
      - targets: ['127.0.0.1:9290']

  - job_name: loki
    scrape_interval: 30s
    static_configs:
      - targets: ['127.0.0.1:3100']

  - job_name: alloy
    scrape_interval: 30s
    static_configs:
      - targets: ['127.0.0.1:12345']

  - job_name: sonarr
    scrape_interval: 60s
    # exportarr --enable-additional-metrics fans out one episode/episodefile API
    # call per series, so a full collection over a large Sonarr library takes
    # ~20s+ (Radarr has no per-episode fan-out, so it stays fast on the default).
    # Without this the scrape hit the 10s default and always errored
    # "context deadline exceeded". Keep timeout < interval.
    scrape_timeout: 45s
    static_configs:
      - targets: ['127.0.0.1:9707']

  - job_name: radarr
    scrape_interval: 60s
    static_configs:
      - targets: ['127.0.0.1:9708']

  # BGW NAT-table size scraper (sidecar service that polls /cgi-bin/nattable.ha
  # and exposes entry counts as gauges). Stays alive but reports
  # bgw_nat_scrape_success=0 when BGW_DEVICE_ACCESS_CODE is unset, so the
  # dashboard surfaces "not configured" rather than going silent.
  - job_name: bgw_nat
    scrape_interval: 60s
    static_configs:
      - targets: ['127.0.0.1:9145']

  # blackbox_exporter self-metrics (the probe daemon's internals, not the probes)
  - job_name: blackbox
    scrape_interval: 60s
    static_configs:
      - targets: ['127.0.0.1:9115']

  # ---- Active ICMP reachability + RTT (internet-drop / bufferbloat watch) ----
  # Pings internet anchors AND the BGW LAN side every 5s via blackbox icmp_v4.
  # Diagnosis split: if 192.168.1.254 (BGW) stays up while the internet targets
  # fail, the fault is the BGW's WAN uplink / AT&T — not the LAN or this host.
  # probe_icmp_duration_seconds{phase="rtt"} climbing under heavy transfer =
  # bufferbloat; sudden probe_success=0 with flat RTT = a hard drop / policer.
  - job_name: icmp_probe
    scrape_interval: 5s
    scrape_timeout: 4s
    metrics_path: /probe
    params:
      module: [icmp_v4]
    static_configs:
      - targets:
          - 1.1.1.1        # Cloudflare (internet anchor)
          - 8.8.8.8        # Google (internet anchor)
          - 9.9.9.9        # Quad9 (internet anchor)
          - 192.168.1.254  # BGW320 LAN side (gateway hop — isolates WAN vs LAN)
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: target
      - target_label: __address__
        replacement: 127.0.0.1:9115

  # APC UPS over Modbus TCP. The ups-modbus-exporter sidecar polls the UPS at
  # UPS_MODBUS_HOST:502 and exposes load / output+input voltage / battery /
  # runtime. Reports apcups_scrape_success=0 when the UPS is unreachable so the
  # UPS dashboard shows "no link" rather than going silent. apcupsd on the
  # Unraid host (USB) remains the graceful-shutdown trigger; this is metrics-only.
  - job_name: ups_modbus
    scrape_interval: 30s
    static_configs:
      - targets: ['127.0.0.1:9686']

  # AC Infinity Controller 69 Pro (WiFi -> cloud). The acinfinity-exporter
  # sidecar logs into the AC Infinity cloud API and exposes probe temp /
  # humidity / VPD and per-port fan power. Reports acinfinity_scrape_success=0
  # when creds are unset or the controller is offline.
  - job_name: acinfinity
    scrape_interval: 60s
    static_configs:
      - targets: ['127.0.0.1:9687']

  # ---- Active DNS health probes via blackbox_exporter ----
  # Multi-target pattern: each scrape sends target=<resolver> + module=<probe>
  # to blackbox, which runs the probe and returns the result. Resolver IP
  # becomes the `resolver` label so the dashboard facets by resolver without
  # each one needing its own scrape config.
  - job_name: dns_probe_a
    scrape_interval: 30s
    metrics_path: /probe
    params:
      module: [dns_a_google]
    static_configs:
      - targets:
          - 8.8.8.8        # Google primary
          - 8.8.4.4        # Google secondary
          - 1.1.1.1        # Cloudflare primary
          - 1.0.0.1        # Cloudflare secondary
          - 9.9.9.9        # Quad9
          - 192.168.1.254  # AT&T BGW (LAN default resolver)
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: resolver
      - target_label: __address__
        replacement: 127.0.0.1:9115

  - job_name: dns_probe_aaaa
    scrape_interval: 60s
    metrics_path: /probe
    params:
      module: [dns_aaaa_google]
    static_configs:
      - targets:
          - 8.8.8.8
          - 1.1.1.1
          - 9.9.9.9
          - 192.168.1.254
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: resolver
      - target_label: __address__
        replacement: 127.0.0.1:9115

  - job_name: dns_probe_alt_domain
    scrape_interval: 60s
    metrics_path: /probe
    params:
      module: [dns_a_cloudflare]
    static_configs:
      - targets:
          - 8.8.8.8
          - 1.1.1.1
          - 9.9.9.9
          - 192.168.1.254
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: resolver
      - target_label: __address__
        replacement: 127.0.0.1:9115

  - job_name: dns_probe_nxdomain
    scrape_interval: 120s
    metrics_path: /probe
    params:
      module: [dns_nxdomain]
    static_configs:
      - targets:
          - 8.8.8.8
          - 1.1.1.1
          - 9.9.9.9
          - 192.168.1.254
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: resolver
      - target_label: __address__
        replacement: 127.0.0.1:9115
