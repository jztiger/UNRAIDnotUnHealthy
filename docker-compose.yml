# Local dev. On Unraid, use the Community Apps template instead.
services:
  unhealthy:
    build:
      context: .
      args:
        # Populated by scripts/docker-build.sh; harmless defaults if you run
        # `docker compose up --build` directly.
        BUILD_COMMIT: ${BUILD_COMMIT:-unknown}
        BUILD_COMMIT_COUNT: ${BUILD_COMMIT_COUNT:-0}
        BUILD_TIME: ${BUILD_TIME:-unknown}
    image: unraidnotunhealthy:dev
    container_name: unraidnotunhealthy
    restart: unless-stopped
    # Required for smartctl_exporter to open every block device for SMART
    # reads, and for ipmi_exporter to open /dev/ipmi0. cap_add SYS_RAWIO
    # alone isn't enough on Unraid's kernel — privileged is the standard
    # pattern for hardware-monitoring containers (scrutiny, etc.).
    privileged: true
    ports:
      - "3000:3000"
    environment:
      TZ: ${TZ:-UTC}
      PROMETHEUS_RETENTION: ${PROMETHEUS_RETENTION:-30d}
      GF_SECURITY_ADMIN_PASSWORD: ${GF_SECURITY_ADMIN_PASSWORD:-admin}
      # Unraid: set PUID=99, PGID=100 to align with the nobody/users
      # convention. Linux/WSL: your user's uid/gid. Defaults are safe.
      PUID: ${PUID:-1000}
      PGID: ${PGID:-1000}
      LOKI_RETENTION: ${LOKI_RETENTION:-14d}
    volumes:
      - /:/rootfs:ro
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /var/log:/host/var/log:ro
      - /dev:/dev
      - prometheus-data:/var/lib/prometheus
      - grafana-data:/var/lib/grafana
      - loki-data:/var/lib/loki

volumes:
  prometheus-data:
  grafana-data:
  loki-data:
